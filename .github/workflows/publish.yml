name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run the test suite before publishing
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Publish to NuGet
        run: ./build.ps1 publish ${{ inputs.run_tests && ' ' || '--no-test' }}
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
